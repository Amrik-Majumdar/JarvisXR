name: Bug report
description: Report a reproducible JARVIS XR problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Remove Apple ID details, device identifiers, signing files, and private note content before submitting.
  - type: input
    id: version
    attributes:
      label: App version or commit
      placeholder: v0.1.0-rc1 or commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Device and iOS version
      placeholder: iPhone XR, iOS 18.x
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: List the exact taps, commands, permissions, and state transitions.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Privacy-safe evidence
      description: Add logs, screenshots, or video only after removing personal data.
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I tested the latest commit or prerelease.
          required: true
        - label: I removed credentials and personal information.
          required: true
