name: Build JarvisXR iOS IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "ios/JarvisXR/**"
      - "core/**"
      - "mock/**"
      - "native/**"
      - "tests/**"
      - "tools/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    paths:
      - "ios/JarvisXR/**"
      - "core/**"
      - "mock/**"
      - "native/**"
      - "tests/**"
      - "tools/**"
      - ".github/workflows/ios-build.yml"

permissions:
  contents: read

concurrency:
  group: jarvisxr-ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-python:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependency
        run: python -m pip install pytest

      - name: Run repository validation
        run: python tests/run_all_tests.py

      - name: Run Windows preview self-test
        run: python preview/windows_jarvis_preview/jarvis_preview.py --self-test

      - name: Upload Windows validation reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: JarvisXR-windows-validation-reports
          if-no-files-found: warn
          path: ios/JarvisXR/build/reports/**

  build-ios:
    needs: validate-python
    runs-on: macos-26
    timeout-minutes: 45
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.5.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Fetch and verify pinned Core ML detector
        run: |
          set -euo pipefail
          mkdir -p ios/JarvisXR/build/reports
          python3 tools/fetch_vision_model.py \
            --report ios/JarvisXR/build/reports/model-fetch.json
          python3 tools/audit_vision_model.py \
            --require-model \
            --output ios/JarvisXR/build/reports/vision-model-audit.json

      - name: Inspect runner and repository
        run: |
          mkdir -p ios/JarvisXR/build/logs
          pwd
          env | sort | tee ios/JarvisXR/build/logs/environment.txt
          find ios/JarvisXR -maxdepth 3 -print | sort
          xcodebuild -version | tee ios/JarvisXR/build/logs/xcode-version.txt
          xcrun simctl list runtimes | tee ios/JarvisXR/build/logs/simulator-runtimes.log
          xcrun simctl list devices available | tee ios/JarvisXR/build/logs/simulator-list-before.txt

      - name: Install XcodeGen
        run: |
          brew install xcodegen
          xcodegen --version

      - name: Generate Xcode project
        working-directory: ios/JarvisXR
        run: |
          set -o pipefail
          mkdir -p build/logs
          xcodegen generate 2>&1 | tee build/logs/xcodegen.log
          find JarvisXR.xcodeproj -maxdepth 3 -print | sort | tee -a build/logs/xcodegen.log
          xcodebuild -list -project JarvisXR.xcodeproj | tee build/logs/schemes.log

      - name: Build JarvisXR for iPhoneOS
        working-directory: ios/JarvisXR
        run: |
          set -o pipefail
          mkdir -p build/logs
          xcodebuild \
            -project JarvisXR.xcodeproj \
            -scheme JarvisXR \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build | tee build/logs/xcodebuild-build.log

      - name: Run JarvisXR unit tests on simulator
        working-directory: ios/JarvisXR
        env:
          VISION_EVALUATION_OUTPUT: ${{ github.workspace }}/ios/JarvisXR/build/reports/native-vision-observations.json
        run: |
          set -o pipefail
          SIM_ID="$(python3 ../../tools/select_ios_simulator.py || true)"
          DESTINATION="$(python3 ../../tools/select_ios_simulator.py --destination || true)"
          python3 ../../tools/select_ios_simulator.py --details | tee build/logs/selected-simulator.txt || true
          if [ -z "$SIM_ID" ]; then
            echo "No available iPhone simulator found. Failing because simulator verification is required." | tee build/logs/xcodebuild-unit-test.log
            exit 1
          fi
          echo "Using simulator id: $SIM_ID" | tee build/logs/xcodebuild-unit-test.log
          echo "Using xcodebuild destination: $DESTINATION" | tee -a build/logs/xcodebuild-unit-test.log
          xcrun simctl list devices available | tee -a build/logs/xcodebuild-unit-test.log
          xcrun simctl boot "$SIM_ID" || true
          xcrun simctl bootstatus "$SIM_ID" -b
          xcrun simctl list devices available | tee build/logs/simulator-list-after-boot.txt
          xcodebuild \
            -project JarvisXR.xcodeproj \
            -scheme JarvisXR \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "$DESTINATION" \
            -derivedDataPath build/TestDerivedData \
            -resultBundlePath build/logs/JarvisXRUnitTests.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -only-testing:JarvisXRTests \
            test | tee -a build/logs/xcodebuild-unit-test.log

      - name: Run focused JarvisXR UI behavior tests
        timeout-minutes: 20
        working-directory: ios/JarvisXR
        run: |
          set -o pipefail
          mkdir -p build/logs build/visual-proof
          SIM_ID="$(python3 ../../tools/select_ios_simulator.py || true)"
          DESTINATION="$(python3 ../../tools/select_ios_simulator.py --destination || true)"
          python3 ../../tools/select_ios_simulator.py --details | tee build/logs/selected-ui-simulator.txt || true
          if [ -z "$SIM_ID" ]; then
            echo "No available iPhone simulator found. Failing because UI verification is required." | tee build/logs/xcodebuild-ui-test.log
            exit 1
          fi
          echo "Using simulator id: $SIM_ID" | tee build/logs/xcodebuild-ui-test.log
          echo "Using xcodebuild destination: $DESTINATION" | tee -a build/logs/xcodebuild-ui-test.log
          xcrun simctl boot "$SIM_ID" || true
          xcrun simctl bootstatus "$SIM_ID" -b
          xcodebuild \
            -project JarvisXR.xcodeproj \
            -scheme JarvisXR \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "$DESTINATION" \
            -derivedDataPath build/TestDerivedData \
            -resultBundlePath build/logs/JarvisXRUITests.xcresult \
            -only-testing:JarvisXRUITests/JarvisXRVisualProofTests/testPrimaryActionsReachableAtCurrentSize \
            -only-testing:JarvisXRUITests/JarvisXRVisualProofTests/testProofHelp \
            -only-testing:JarvisXRUITests/JarvisXRVisualProofTests/testProofVisionDescribeResult \
            -only-testing:JarvisXRUITests/JarvisXRVisualProofTests/testProofVisionLiveActive \
            -only-testing:JarvisXRUITests/JarvisXRVisualProofTests/testProofVisionReading \
            -only-testing:JarvisXRUITests/JarvisXRVisualProofTests/testProofVisionPermissionDenied \
            -only-testing:JarvisXRUITests/JarvisXRVisualProofTests/testVisionAccessibilityMetadataAndTouchTargets \
            -only-testing:JarvisXRUITests/JarvisXRVisualProofTests/testVisionCompactLargeTypeKeepsStopVisible \
            -only-testing:JarvisXRUITests/JarvisXRVisualProofTests/testVisionRepeatedStartStopFixtureCycles \
            test | tee -a build/logs/xcodebuild-ui-test.log

      - name: Run vision fixture and policy evaluation
        run: |
          set -euo pipefail
          mkdir -p ios/JarvisXR/build/reports
          python3 tools/evaluate_vision_fixtures.py \
            --observations ios/JarvisXR/build/reports/native-vision-observations.json \
            --output ios/JarvisXR/build/reports/vision-fixture-native.json
          python3 tools/audit_vision_safety.py \
            --output ios/JarvisXR/build/reports/vision-safety-audit.json
          python3 tools/audit_vision_privacy.py \
            --output ios/JarvisXR/build/reports/vision-privacy-audit.json

      - name: Package unsigned IPA
        working-directory: ios/JarvisXR
        run: |
          set -e
          APP_PATH="build/DerivedData/Build/Products/Release-iphoneos/JarvisXR.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "JarvisXR.app was not found at $APP_PATH" | tee BUILD_REAL_APP_STATUS.md
            exit 1
          fi
          rm -rf build/Payload
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/JarvisXR.app
          (cd build && zip -qry JarvisXR-unsigned.ipa Payload)
          if [ ! -s build/JarvisXR-unsigned.ipa ]; then
            echo "Unsigned IPA packaging failed." | tee BUILD_REAL_APP_STATUS.md
            exit 1
          fi
          {
            echo "JarvisXR build summary"
            echo "Runner: $(sw_vers -productVersion)"
            echo "Xcode: $(xcodebuild -version | tr '\n' ' ')"
            echo "Artifact: ios/JarvisXR/build/JarvisXR-unsigned.ipa"
            echo "Size bytes: $(stat -f%z build/JarvisXR-unsigned.ipa)"
            echo "Install with Sideloadly from Windows."
          } | tee BUILD_REAL_APP_STATUS.md

      - name: Audit unsigned IPA
        run: |
          set -o pipefail
          mkdir -p ios/JarvisXR/build/logs ios/JarvisXR/build/reports
          python3 tools/audit_ipa.py ios/JarvisXR/build/JarvisXR-unsigned.ipa \
            --json-output ios/JarvisXR/build/reports/ipa-audit.json \
            | tee ios/JarvisXR/build/logs/ipa-audit.log

      - name: Capture required iOS screenshots
        timeout-minutes: 10
        working-directory: ios/JarvisXR
        run: |
          set -euo pipefail
          mkdir -p build/visual-proof build/logs
          VISUAL_PROOF_DIR="$GITHUB_WORKSPACE/ios/JarvisXR/build/visual-proof"
          export VISUAL_PROOF_DIR
          echo "VISUAL_PROOF_DIR=$VISUAL_PROOF_DIR" | tee build/logs/xcodebuild-visual-proof.log
          SIM_ID="$(python3 ../../tools/select_ios_simulator.py || true)"
          DESTINATION="$(python3 ../../tools/select_ios_simulator.py --destination || true)"
          python3 ../../tools/select_ios_simulator.py --details | tee build/logs/selected-simulator.txt || true
          if [ -z "$SIM_ID" ]; then
            echo "No available iPhone simulator found. Screenshot proof cannot be generated." | tee -a build/logs/xcodebuild-visual-proof.log
            exit 1
          fi
          echo "Using simulator id for visual proof: $SIM_ID" | tee -a build/logs/xcodebuild-visual-proof.log
          echo "Using xcodebuild destination for visual proof: $DESTINATION" | tee -a build/logs/xcodebuild-visual-proof.log
          xcrun simctl list devices available | tee -a build/logs/xcodebuild-visual-proof.log
          xcrun simctl boot "$SIM_ID" || true
          xcrun simctl bootstatus "$SIM_ID" -b
          xcrun simctl list devices available | tee build/logs/simulator-list-after-boot.txt

          APP_PATH="build/TestDerivedData/Build/Products/Debug-iphonesimulator/JarvisXR.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Simulator app missing after unit tests. Building simulator app for visual proof." | tee -a build/logs/xcodebuild-visual-proof.log
            xcodebuild \
              -project JarvisXR.xcodeproj \
              -scheme JarvisXR \
              -configuration Debug \
              -sdk iphonesimulator \
              -destination "$DESTINATION" \
              -derivedDataPath build/VisualProofDerivedData \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              build | tee -a build/logs/xcodebuild-visual-proof.log
            APP_PATH="build/VisualProofDerivedData/Build/Products/Debug-iphonesimulator/JarvisXR.app"
          fi
          if [ ! -d "$APP_PATH" ]; then
            echo "Visual proof simulator app was not found." | tee -a build/logs/xcodebuild-visual-proof.log
            exit 1
          fi

          xcrun simctl install "$SIM_ID" "$APP_PATH" | tee -a build/logs/xcodebuild-visual-proof.log

          capture_state() {
            state="$1"
            file="$2"
            delay="${3:-4}"
            echo "Capturing $file from state $state" | tee -a build/logs/xcodebuild-visual-proof.log
            xcrun simctl terminate "$SIM_ID" com.amrik.jarvisxr >/dev/null 2>&1 || true
            xcrun simctl launch "$SIM_ID" com.amrik.jarvisxr --jarvis-ui-test --jarvis-state "$state" | tee -a build/logs/xcodebuild-visual-proof.log
            sleep "$delay"
            xcrun simctl io "$SIM_ID" screenshot "$VISUAL_PROOF_DIR/$file" | tee -a build/logs/xcodebuild-visual-proof.log
            if [ ! -s "$VISUAL_PROOF_DIR/$file" ]; then
              echo "Screenshot $file was not created or was empty." | tee -a build/logs/xcodebuild-visual-proof.log
              exit 1
            fi
          }

          capture_state standby standby.png 4
          capture_state ready ready.png 4
          capture_state listening listening.png 4
          capture_state processing processing.png 4
          capture_state no_speech no-speech.png 4
          capture_state long_hold_standby long-hold-standby.png 4
          capture_state keyboard keyboard.png 4
          capture_state help help.png 4
          capture_state mesh mesh.png 4
          capture_state inspection inspection.png 5
          capture_state object_model_missing object-model-missing.png 5
          capture_state settings settings.png 4
          capture_state diagnostics diagnostics.png 4
          capture_state vision_idle vision-idle.png 3
          capture_state vision_describe_listening vision-describe-listening.png 3
          capture_state vision_describe_analyzing vision-describe-analyzing.png 3
          capture_state vision_describe_result vision-describe-result.png 3
          capture_state vision_live_active vision-live-active.png 3
          capture_state vision_find_searching vision-find-searching.png 3
          capture_state vision_find_centered vision-find-centered.png 3
          capture_state vision_reading vision-reading.png 3
          capture_state vision_scan_result vision-scan-result.png 3
          capture_state vision_permission_denied vision-permission-denied.png 3
          capture_state vision_model_unavailable vision-model-unavailable.png 3
          capture_state vision_settings vision-settings.png 3
          capture_state vision_help vision-help.png 3
          capture_state vision_self_test vision-self-test.png 3
          capture_state vision_onboarding vision-onboarding.png 3

          python3 ../../tools/verify_visual_proof.py "$VISUAL_PROOF_DIR" | tee -a build/logs/xcodebuild-visual-proof.log
          ls -lh "$VISUAL_PROOF_DIR" | tee -a build/logs/xcodebuild-visual-proof.log

      - name: Debug visual proof filesystem
        if: always()
        run: |
          echo "workspace=$GITHUB_WORKSPACE"
          pwd
          ls -la
          mkdir -p ios/JarvisXR/build/logs
          {
            echo "Repository root:"
            pwd
            echo ""
            echo "ios/JarvisXR/build files:"
            find ios/JarvisXR/build -maxdepth 5 -type f -print 2>/dev/null || true
            echo ""
            echo "visual-proof paths:"
            find "$GITHUB_WORKSPACE" -path '*visual-proof*' -print 2>/dev/null || true
            echo ""
            echo "xcresult paths:"
            find ios/JarvisXR/build -name '*.xcresult' -print 2>/dev/null || true
            echo ""
            echo "DerivedData logs:"
            find ios/JarvisXR/build -path '*Logs*' -type f -print 2>/dev/null || true
          } | tee ios/JarvisXR/build/logs/visual-proof-filesystem-debug.log
          find ios/JarvisXR/build -maxdepth 8 -print 2>/dev/null | sort | tee ios/JarvisXR/build/logs/artifact-tree.txt

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v7
        with:
          name: JarvisXR-unsigned-ipa
          path: ios/JarvisXR/build/JarvisXR-unsigned.ipa

      - name: Upload iOS screenshot proof
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: JarvisXR-ios-screenshot-proof
          if-no-files-found: error
          path: ios/JarvisXR/build/visual-proof/*.png

      - name: Upload vision evaluation reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: JarvisXR-vision-evaluation
          if-no-files-found: error
          path: ios/JarvisXR/build/reports/**

      - name: Upload XCTest result bundles
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: JarvisXR-xcresults
          if-no-files-found: warn
          path: ios/JarvisXR/build/logs/*.xcresult

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: JarvisXR-build-output
          if-no-files-found: warn
          path: |
            ios/JarvisXR/build/build.log
            ios/JarvisXR/build/test.log
            ios/JarvisXR/build/schemes.log
            ios/JarvisXR/build/ipa-audit.log
            ios/JarvisXR/build/logs/**
            ios/JarvisXR/build/DerivedData/Logs/**
            ios/JarvisXR/build/TestDerivedData/Logs/**
            ios/JarvisXR/build/VisualProofDerivedData/Logs/**
            ios/JarvisXR/build/visual-proof/**
            ios/JarvisXR/build/reports/**
            ios/JarvisXR/BUILD_REAL_APP_STATUS.md
